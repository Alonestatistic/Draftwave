<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The DAW</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<div id="boot" style="position:fixed;inset:0;background:#05060a;display:grid;place-items:center;z-index:99999;transition:opacity .4s">
  <div style="text-align:center">
    <div style="width:46px;height:46px;margin:0 auto 16px;border-radius:12px;
      background:conic-gradient(from 210deg,#1fe3ff,#9b6bff,#1fe39a,#1fe3ff);
      box-shadow:0 0 30px rgba(31,227,255,.5);display:grid;place-items:center;animation:popIn .5s ease">
      <div style="width:16px;height:16px;background:#05060a;border-radius:3px;transform:rotate(45deg)"></div>
    </div>
    <div style="font-family:'Space Grotesk',sans-serif;letter-spacing:.22em;font-size:13px;color:#99a3b4">THE DAW</div>
  </div>
</div>

<script type="module" src="/src/main.jsx"></script>

<script>
  // hide boot splash once React paints
  const obs = setInterval(()=>{ if(document.querySelector('#root header')){ const b=document.getElementById('boot');
    b.style.opacity=0; setTimeout(()=>b.remove(),420); clearInterval(obs); } }, 80);
  setTimeout(()=>{ const b=document.getElementById('boot'); if(b){b.style.opacity=0;setTimeout(()=>b&&b.remove(),420);} }, 5000);
</script>

<style id="__om-edit-overrides"></style>
</body>
</html>
